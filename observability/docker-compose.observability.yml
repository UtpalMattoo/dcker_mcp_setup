services:
  # LGTM Stack: Loki, Tempo, Mimir, Grafana
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: otel-lgtm
    ports:
      - "127.0.0.1:3000:3000"    # Grafana UI (localhost only)
      - "127.0.0.1:4317:4317"    # OTLP gRPC receiver (localhost only)
      - "127.0.0.1:4318:4318"    # OTLP HTTP receiver (localhost only)
      - "127.0.0.1:9411:9411"    # Zipkin receiver (localhost only)
    env_file:
      - ./grafana/env/grafana.env
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_EXPLORE_ENABLED=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /tmp/ready
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - observability

  # Grafana Alloy: Telemetry collector and processor
  alloy:
    image: grafana/alloy:latest
    container_name: grafana-alloy
    command: run /etc/alloy/runtime.river --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "127.0.0.1:12345:12345"  # Alloy UI (localhost only)
    volumes:
      - ./alloy/config:/etc/alloy:ro
      - alloy-data:/var/lib/alloy
      - ./runtime-logs:/mnt/service-logs:ro
      - ${QDRANT_HOST_LOGS_DIR:-${APPDATA}/Qdrant/logs}:/mnt/qdrant-host-logs:ro
      - ${VSCODE_LOGS_DIR:-${APPDATA}/Code/logs}:/mnt/vscode-logs:ro
      - ${COPILOT_EXTENSION_LOGS_DIR:-${APPDATA}/Code/User/globalStorage/GitHub.copilot}:/mnt/copilot-logs:ro
    env_file:
      - ./alloy/env/alloy.env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4317
      - ENABLE_VSCODE_LOGS=${ENABLE_VSCODE_LOGS:-true}
      - ENABLE_COPILOT_LOGS=${ENABLE_COPILOT_LOGS:-false}
      - ENABLE_SERVICE_LOGS=${ENABLE_SERVICE_LOGS:-true}
      - ENABLE_QDRANT_LOGS=${ENABLE_QDRANT_LOGS:-true}
      - REDACTION_MODE=${REDACTION_MODE:-strict}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      lgtm:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - pidof alloy >/dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - observability
    restart: unless-stopped

  grafana-rbac-init:
    image: curlimages/curl:8.11.1
    container_name: grafana-rbac-init
    depends_on:
      lgtm:
        condition: service_healthy
    env_file:
      - ./grafana/env/grafana.env
    environment:
      - GRAFANA_URL=http://lgtm:3000
      - GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GRAFANA_DEV_VIEWER_USER=${GRAFANA_DEV_VIEWER_USER:-}
      - GRAFANA_DEV_VIEWER_PASSWORD=${GRAFANA_DEV_VIEWER_PASSWORD:-}
      - GRAFANA_RESTRICTED_USER=${GRAFANA_RESTRICTED_USER:-}
      - GRAFANA_RESTRICTED_PASSWORD=${GRAFANA_RESTRICTED_PASSWORD:-}
    command: ["sh", "/etc/grafana/rbac/bootstrap-rbac.sh"]
    volumes:
      - ./grafana/rbac:/etc/grafana/rbac:ro
    networks:
      - observability
    restart: "no"

volumes:
  alloy-data:
    driver: local

networks:
  # External network shared with services compose
  observability:
    driver: bridge
    external: true
