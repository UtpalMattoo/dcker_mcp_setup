apiVersion: 1

datasources:
  # Loki datasource for logs
  - name: Loki
    type: loki
    access: proxy
    url: http://lgtm:3100
    isDefault: false
    editable: true
    version: 1
    jsonData:
      maxLines: 1000
      derivedFields: []

  # Tempo datasource for traces
  - name: Tempo
    type: tempo
    access: proxy
    url: http://lgtm:3100
    isDefault: false
    editable: true
    version: 1
    jsonData:
      nodeGraph:
        enabled: true
      tracesToLogs:
        datasourceUid: loki

  # Mimir datasource for metrics
  - name: Mimir
    type: prometheus
    access: proxy
    url: http://lgtm:9009
    isDefault: true
    editable: true
    version: 1
    jsonData:
      timeInterval: 30s

  # Prometheus datasource (for compatibility)
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://lgtm:9090
    isDefault: false
    editable: true
    version: 1
    jsonData:
      timeInterval: 30s

  # OTLP datasource (if available)
  - name: OTLP
    type: jaeger
    access: proxy
    url: http://lgtm:16686
    isDefault: false
    editable: true
    version: 1
